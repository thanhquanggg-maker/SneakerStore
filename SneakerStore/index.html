<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web - SneakerStore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">SneakerStore</div>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Product</a></li>
                <li><a href="#">Payment</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="nav-icons">
               <input type="text" placeholder="Search..." class="search-box">
                <span class="fa fa-shopping-cart"></span>
            </div>
        </nav>
    </header>
    <section class="banner">
        <img src="images/banner.jpg" alt="Banner chinh" class="banner-img"> 

    </section>
    <section class="category">
    <h2>Danh Mục Sản Phẩm</h2>

    <div class="category-list">
        <div class="category-item">Giày chạy bộ</div>
        <div class="category-item">Giày bóng rổ</div>
        <div class="category-item">Giày lifestyle</div>
        <div class="category-item">Giày tập luyện</div>
    </div>
</section>
</body>
</html>
